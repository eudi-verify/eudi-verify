packages:
  - "packages/*"
  - "examples/*"

overrides:
  esbuild: ">=0.28.1"
  vite: ">=6.4.3"
  # ^3.15.0 — not >=3.15.0. Bare >= pulls js-yaml 4.x, which drops safeLoad and breaks
  # @changesets/cli → @manypkg/get-packages → read-yaml-file@1.1.0.
  "js-yaml@3": "^3.15.0"

allowBuilds:
  esbuild: true

onlyBuiltDependencies:
  - esbuild
