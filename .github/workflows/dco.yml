name: DCO

on:
  pull_request:

jobs:
  dco:
    name: DCO sign-off
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify Signed-off-by on all commits
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          echo "Checking commits in ${base}..${head}"
          missing=0
          while read -r sha; do
            if ! git log -1 --format='%B' "$sha" | grep -qiE '^Signed-off-by: .+ <.+@.+>'; then
              echo "::error::Commit $sha is missing a 'Signed-off-by' line (DCO)."
              git log -1 --format='  %h %s' "$sha"
              missing=1
            fi
          done < <(git rev-list --no-merges "${base}..${head}")
          if [ "$missing" -ne 0 ]; then
            echo ""
            echo "Every commit must be signed off per the DCO. See CONTRIBUTING.md."
            echo "Fix an existing branch with:  git rebase --signoff ${base} && git push --force-with-lease"
            exit 1
          fi
          echo "All non-merge commits are signed off. ✔"
