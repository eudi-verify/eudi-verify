name: CI

on:
  push:
    branches: [main]
  pull_request_target:

jobs:
  source-security:
    name: Source Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Scan committed source (trojan-source, padding)
        run: bash scripts/check-source-security.sh

  build:
    name: Typecheck & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - uses: SocketDev/action@v1
        with:
          mode: firewall-free

      - name: Install dependencies
        run: sfw pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Docs version sync
        run: bash scripts/check-docs-version.sh

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Lint OpenAPI
        run: pnpm lint:api

      - name: Test
        run: pnpm test

  license-check:
    name: License Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - uses: SocketDev/action@v1
        with:
          mode: firewall-free

      - name: Install dependencies
        run: sfw pnpm install --frozen-lockfile

      - name: Check licenses
        run: >
          npx --yes license-checker-rseidelsohn
          --onlyAllow "Apache-2.0;MIT;BSD-2-Clause;BSD-3-Clause;ISC;0BSD"
          --excludePrivatePackages

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - uses: SocketDev/action@v1
        with:
          mode: firewall-free

      - name: Install dependencies
        run: sfw pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --audit-level=high
